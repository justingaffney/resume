name: CI/CD

on:
  push:
    branches:
      - main

env:
  THEME_HTML: elegant
  THEME_PDF: kendall

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install JSON Resume themes
        run: npm install jsonresume-theme-${{ env.THEME_HTML }} jsonresume-theme-${{ env.THEME_PDF }}

      - name: Generate JSON
        run: npx @justingaffney/resume-renderer -i resume.yaml -o resume.json -f json

      - name: Validate resume.json
        run: npx resumed validate

      #- name: Generate Markdown
      #  run: npx @justingaffney/resume-renderer -i resume.json -o resume.md -f markdown

      - name: Generate HTML
        run: npx @justingaffney/resume-renderer -i resume.json -o resume.html -f html --theme ${{ env.THEME_HTML }}

      - name: Generate PDF
        run: npx @justingaffney/resume-renderer -i resume.json -o resume.pdf -f pdf --theme ${{ env.THEME_PDF }}

      - name: Generate DOCX
        run: npx @justingaffney/resume-renderer -i resume.json -o resume.docx -f docx --theme ${{ env.THEME_PDF }}

      - name: Upload resume artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: resume.*
              
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Setup Pages artifact
        run: cp resume.html index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: index.html

  # TODO Release job. For created releases, render and upload resume artifacts to GitHub Releases

  # TODO Only deploy for published releases
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # TODO Update resume.json Gist
