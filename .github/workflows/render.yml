name: Generate resume artifacts

on:
  push:
    branches:
      - main

jobs:

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install resume CLI and theme
        run: npm install resumed jsonresume-theme-elegant

      - name: Convert resume from YAML to JSON
        uses: mikefarah/yq@master
        with:
          cmd: yq -p yaml -o json resume.yaml > resume.json

      - name: Validate resume.json
        run: npx resumed validate

      - name: Render to HTML
        run: npx resumed render resume.json -t jsonresume-theme-elegant -o resume.html

      - name: Archive JSON
        uses: actions/upload-artifact@v4
        with:
          name: resume.json
          path: resume.json

      - name: Archive HTML
        uses: actions/upload-artifact@v4
        with:
          name: resume.html
          path: resume.html
