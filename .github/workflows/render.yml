name: Render resume

on:
    push:
      branches:
        - main

jobs:

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert resume from YAML to JSON
        uses: mikefarah/yq@master
        with:
          cmd: yq -p yaml -o json resume.yml > resume.json
      
      - name: Archive resume JSON
        uses: actions/upload-artifact@v4
        with:
          name: resume.json
          path: resume.json
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install resume-cli
        run: npm install resume-cli

      - name: Validate resume.json
        run: npx resume validate

      - name: Install theme
        run: npm install jsonresume-theme-elegant

      - name: Render to HTML
        run: npx resume export resume.json --theme jsonresume-theme-elegant --format html

      - name: Render to PDF
        run: npx resume export resume.json --theme jsonresume-theme-elegant --format pdf

      - name: Archive resume HTML
        uses: actions/upload-artifact@v4
        with:
          name: resume.html
          path: resume.html

      - name: Archive resume PDF
        uses: actions/upload-artifact@v4
        with:
          name: resume.pdf
          path: resume.pdf
